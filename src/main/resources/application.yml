server:
  port: ${PORT:8080}
  shutdown: graceful

spring:
  application:
    name: ai-consumption-proxy-backend
  profiles:
    active: ${SPRING_PROFILES_ACTIVE:development}

management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized

logging:
  level:
    root: INFO
    com.aiproxy: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %msg%n"

scheduling:
  enabled: true
