services:
  - type: web
    name: ai-proxy-backend
    runtime: docker
    plan: standard
    branch: main
    healthCheckPath: /actuator/health
    envVars:
      - key: JAVA_OPTS
        value: -Xmx512m -Xms256m
      - key: SPRING_PROFILES_ACTIVE
        value: prod
      - key: DATABASE_URL
        fromDatabase:
          name: ai-proxy-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: ai-proxy-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: ai-proxy-db
          property: password

databases:
  - name: ai-proxy-db
    plan: free
    databaseName: aiproxy
    user: aiproxy
